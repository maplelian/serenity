<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serenity | 报告存档</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f172a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            color: #e2e8f0;
        }
        .container {
            max-width: 640px;
            width: 100%;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #94a3b8;
            font-size: 1rem;
            margin-bottom: 40px;
        }
        .report-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .report-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            text-decoration: none;
            color: #e2e8f0;
            transition: all 0.2s;
        }
        .report-link:hover {
            background: #334155;
            border-color: #667eea;
            transform: translateX(4px);
        }
        .report-date {
            font-weight: 600;
            font-size: 1.1rem;
        }
        .report-arrow {
            color: #667eea;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Serenity</h1>
        <p class="subtitle">报告存档</p>
        <div class="report-list">
            <a href="2026-06-02/" class="report-link">
                <span class="report-date">2026-06-02</span>
                <span class="report-arrow">&rarr;</span>
            </a>
        </div>
    </div>
</body>
</html>
